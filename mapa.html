<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Rastreamento com Rota</title>

  <script src="https://js.api.here.com/v3/3.1/mapsjs-core.js"></script>
  <script src="https://js.api.here.com/v3/3.1/mapsjs-service.js"></script>
  <script src="https://js.api.here.com/v3/3.1/mapsjs-mapevents.js"></script>

  <style>
    body { margin: 0; }
    #map { width: 100%; height: 90vh; }
    #info {
      padding: 10px;
      font-family: Arial;
      background: #f5f5f5;
    }
  </style>
</head>

<body>

<div id="map"></div>
<div id="info">Carregando localização...</div>

<script>
  var platform = new H.service.Platform({
    apikey: 'Dl_LkTqPVX_a6n3KotxD2jppLKthxJ7cAVTaW2ROSkA'
  });

  var layers = platform.createDefaultLayers();

  var map = new H.Map(
    document.getElementById('map'),
    layers.vector.normal.map,
    {
      zoom: 15,
      center: { lat: -23.42, lng: -51.93 }
    }
  );

  var behavior = new H.mapevents.Behavior(new H.mapevents.MapEvents(map));

  var marker;
  var lineString = new H.geo.LineString();
  var polyline;

  // 🚗 Ícone de carro
  var icon = new H.map.Icon("https://img.icons8.com/color/48/car.png");

  if (navigator.geolocation) {

    navigator.geolocation.watchPosition(function(pos) {

      var lat = pos.coords.latitude;
      var lng = pos.coords.longitude;

      map.setCenter({ lat: lat, lng: lng });
      map.setZoom(16);

      // Atualiza marcador (carro)
      if (!marker) {
        marker = new H.map.Marker({ lat: lat, lng: lng }, { icon: icon });
        map.addObject(marker);
      } else {
        marker.setGeometry({ lat: lat, lng: lng });
      }

      // Adiciona ponto na rota
      lineString.pushPoint({ lat: lat, lng: lng });

      // Desenha linha (rota)
      if (!polyline) {
        polyline = new H.map.Polyline(lineString, {
          style: { strokeColor: 'blue', lineWidth: 4 }
        });
        map.addObject(polyline);
      } else {
        polyline.setGeometry(lineString);
      }

      // Mostrar coordenadas
      document.getElementById("info").innerHTML =
        "🚗 Latitude: " + lat.toFixed(6) +
        " | Longitude: " + lng.toFixed(6);

    }, function(error) {
      document.getElementById("info").innerHTML =
        "❌ Erro: " + error.message;
    });

  } else {
    document.getElementById("info").innerHTML =
      "Seu navegador não suporta GPS.";
  }
</script>

</body>
</html>
